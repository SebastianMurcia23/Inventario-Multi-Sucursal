# OptiPlant Backend Configuration for Docker
#
# Configuración para ejecutar en Docker Compose
# Las variables se cargan desde el archivo .env

# ===============================
# DATABASE (Conectar al servicio 'db' de Docker Compose)
# ===============================
spring.datasource.url=jdbc:postgresql://db:5432/postgres
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.baselineOnMigrate=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.inventario=INFO

# ===============================
# APPLICATION
# ===============================
spring.application.name=OptiPlant-Inventory-System
server.port=8080
server.servlet.context-path=/api/v1
