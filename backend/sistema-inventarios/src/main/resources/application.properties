# ===============================
# CONFIGURACION DE LA BASE DE DATOS
# ===============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:Sebastian0423.}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update: crea tablas faltantes y agrega columnas faltantes automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# ===============================
# FLYWAY - Deshabilitado (Hibernate maneja el schema)
# ===============================
spring.flyway.enabled=false

# ===============================
# JWT CONFIGURATION
# ===============================
app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration=${JWT_EXPIRATION:3600000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.inventario=DEBUG
logging.level.org.springframework.security=DEBUG

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ===============================
# APPLICATION
# ===============================
spring.application.name=OptiPlant-Inventory-System
server.servlet.context-path=/api/v1
